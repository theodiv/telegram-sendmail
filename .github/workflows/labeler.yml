name: PR auto-label

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  label:
    name: Apply labels from PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Parse title and sync labels
        uses: actions/github-script@v8
        with:
          script: |
            const title = context.payload.pull_request.title;
            const match = title.match(/^(\w+)(?:\((\w+)\))?!?:/);
            if (!match) return;

            const type = match[1];
            const scope = match[2];

            const validTypes = [
              "feat", "fix", "refactor", "test",
              "docs", "chore", "perf", "ci",
            ];
            const validScopes = [
              "config", "parser", "client", "smtp",
              "spool", "cli", "build",
            ];

            const desired = new Set();
            if (validTypes.includes(type)) desired.add(type);
            if (scope && validScopes.includes(scope)) desired.add(`scope: ${scope}`);

            const managed = new Set([
              ...validTypes,
              ...validScopes.map(s => `scope: ${s}`),
            ]);

            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const label of current) {
              if (managed.has(label.name) && !desired.has(label.name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label.name,
                });
              }
            }

            const currentNames = new Set(current.map(l => l.name));
            const toAdd = [...desired].filter(l => !currentNames.has(l));

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: toAdd,
              });
            }
