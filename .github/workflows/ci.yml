name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: MyPy type check
        run: mypy src/ tests/

  test:
    name: "Test using Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: |
          pytest \
            --cov=telegram_sendmail \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=80 \
            -v

      - name: Enforce per-module coverage thresholds
        if: matrix.python-version == '3.13'
        run: python scripts/module_coverage.py

      - name: Upload coverage report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  binary-smoke-test:
    name: PyInstaller binary smoke test
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and PyInstaller
        run: |
          pip install --no-binary charset-normalizer -e .
          pip install pyinstaller

      - name: Build one-file binary
        run: |
          pyinstaller \
            --onefile \
            --name telegram-sendmail \
            --strip \
            --console \
            src/telegram_sendmail/__main__.py

      - name: "Smoke-test: binary starts and prints version"
        run: ./dist/telegram-sendmail --version

      - name: "Smoke-test: help flag exits cleanly"
        run: ./dist/telegram-sendmail --help

      - name: "Smoke-test: pipe mode parses a minimal RFC 2822 message"
        run: |
          printf 'From: ci@localhost\nSubject: CI smoke test\n\nHello from CI\n' \
            | ./dist/telegram-sendmail --console --debug 2>&1 \
            | tee /tmp/smoke-output.log; \
          EXIT_CODE=${PIPESTATUS[1]}; \
          echo "Binary exited with code ${EXIT_CODE}"
          # Exit code 78 (EX_CONFIG) is expected: no config file exists in CI.
          # Any other non-zero code signals a broken import or startup crash.
          if [ "${EXIT_CODE}" -ne 78 ]; then
            echo "ERROR: expected exit code 78 (EX_CONFIG), got ${EXIT_CODE}" >&2
            exit 1
          fi
