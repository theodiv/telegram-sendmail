name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Check tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python3 -c "
          import sys
          sys.path.insert(0, 'src')
          from telegram_sendmail import __version__
          print(__version__)
          ")

          echo "Git tag version : ${TAG_VERSION}"
          echo "Package version : ${PKG_VERSION}"

          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "ERROR: tag version (${TAG_VERSION}) does not match" \
                 "package version (${PKG_VERSION})." >&2
            echo "Update __version__ in src/telegram_sendmail/__init__.py" \
                 "before tagging the release." >&2
            exit 1
          fi

  build-binary:
    name: "Build binary (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    needs: verify-version
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        include:
          # ubuntu-22.04 links against glibc 2.35, which is older than glibc
          # shipped with ubuntu-24.04; the resulting binaries are forward-
          # compatible with any Linux distribution that ships glibc 2.35+.
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: aarch64

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and PyInstaller
        run: |
          pip install --no-binary charset-normalizer -e .
          pip install pyinstaller

      - name: Build one-file binary
        run: |
          pyinstaller \
            --onefile \
            --name telegram-sendmail \
            --strip \
            --console \
            src/telegram_sendmail/__main__.py

          # Smoke-test: the binary must exit cleanly and print the version.
          ./dist/telegram-sendmail --version

      - name: Verify glibc requirement of produced binary
        run: |
          objdump -p dist/telegram-sendmail \
            | grep -i glibc \
            | sort -t. -k2 -n
          echo "---"
          echo "The minimum required glibc version is shown above."

      - name: Rename binary with platform suffix
        run: |
          BINARY="dist/telegram-sendmail-linux-${{ matrix.arch }}"
          mv dist/telegram-sendmail "${BINARY}"
          echo "BINARY_PATH=${BINARY}" >> "$GITHUB_ENV"
          echo "BINARY_NAME=$(basename ${BINARY})" >> "$GITHUB_ENV"

      - name: Generate SHA-256 checksum
        run: |
          (cd dist && sha256sum "${BINARY_NAME}") > "${BINARY_PATH}.sha256"
          cat "${BINARY_PATH}.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.arch }}
          path: |
            ${{ env.BINARY_PATH }}
            ${{ env.BINARY_PATH }}.sha256
          retention-days: 1
          if-no-files-found: error

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build-binary
    timeout-minutes: 5

    steps:
      - name: Checkout source (for CHANGELOG extraction)
        uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          # Extract the section for the current tag version from CHANGELOG.md.
          # The section is delimited by two level-2 headings (## [x.y.z]).
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v ver="## [${TAG_VERSION}]" \
            'index($0, ver) == 1 {found=1; next} found && /^## /{exit} found && /^\[.*\]: /{next} found' \
            CHANGELOG.md)

          NOTES=$(echo "$NOTES" | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')

          if [ -z "${NOTES}" ]; then
            echo "WARNING: No CHANGELOG entry found for version ${TAG_VERSION}." >&2
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi

          # Write to a temp file to avoid shell escaping issues with multiline
          # strings passed through GITHUB_OUTPUT.
          echo "${NOTES}" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: "telegram-sendmail ${{ github.ref_name }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*
          fail_on_unmatched_files: true
